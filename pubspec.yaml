name: compusolucion_web
description: "Página web innovadora para Compusolución"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  glass_kit: ^4.0.2
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.1
  responsive_framework: ^1.5.1
  animated_background: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/mascota.png
